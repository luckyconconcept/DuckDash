<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Duck & Dash ist ein schnelles Browser-Minispiel mit einer Gummiente im chaotischen Badezimmer."
    />
    <title>Duck & Dash</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Duck & Dash browser game">
      <div id="game"></div>
      <aside class="rotate-gate" aria-label="Landscape Hinweis">
        <span class="phone-icon" aria-hidden="true"></span>
        <strong>Bitte drehen</strong>
        <span>Duck & Dash spielt sich quer am besten.</span>
      </aside>
    </main>
    <script
      src="phaser.min.js?v=3.80.1"
      onerror="document.getElementById('game').innerHTML='&lt;p style=&quot;color:#fff;text-align:center;padding:2rem;font-family:sans-serif&quot;&gt;Spiel konnte nicht geladen werden (phaser.min.js fehlt). Bitte alle Dateien hochladen und neu laden.&lt;/p&gt;'"
    ></script>
    <script src="game.js?v=20260623-local-phaser"></script>
  </body>
</html>
